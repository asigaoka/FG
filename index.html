<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reaction Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            font-family: 'sans-serif';
            -webkit-tap-highlight-color: transparent;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* 判定テキストのアニメーション */
        @keyframes judgePop {
            0% { transform: scale(0.3) translateY(30px); opacity: 0; }
            15% { transform: scale(1.1) translateY(-5px); opacity: 1; }
            25% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(1.05); opacity: 1; }
        }
        
        .color-success { color: #22d3ee; text-shadow: 0 0 20px rgba(34, 211, 238, 0.8); }
        .color-miss { color: #f87171; text-shadow: 0 0 20px rgba(248, 113, 113, 0.8); }

        .judge-animation {
            animation: judgePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .diff-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 0.2rem;
            letter-spacing: 0.1em;
        }
        .early-text { color: #60a5fa; }
        .late-text { color: #fb7185; }
        .success-text { color: #4ade80; }

        /* タイミングゲージ */
        .timing-gauge-container {
            width: 300px;
            height: 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            margin-top: 1.5rem;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        /* ゲージ内のグリッド（目盛り） */
        .gauge-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .grid-line {
            position: absolute;
            width: 1px;
            height: 100%;
            background: rgba(255,255,255,0.1);
        }
        .grid-line.major {
            background: rgba(255,255,255,0.2);
        }
        .grid-label {
            position: absolute;
            bottom: -18px;
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .success-zone {
            position: absolute;
            height: 100%;
            background: rgba(34, 211, 238, 0.25);
            border-left: 2px solid #22d3ee;
            border-right: 2px solid #22d3ee;
            z-index: 5;
        }
        
        .timing-marker {
            position: absolute;
            width: 4px;
            height: 120%;
            background: white;
            top: -10%;
            transform: translateX(-50%);
            box-shadow: 0 0 10px white;
            z-index: 20;
        }

        /* 画面フラッシュ */
        @keyframes flashEffect {
            0% { background: rgba(255,255,255,0); }
            10% { background: var(--flash-color); }
            100% { background: rgba(255,255,255,0); }
        }
        .flash-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 50;
        }
        .do-flash { animation: flashEffect 0.4s ease-out forwards; }

        .video-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 10;
        }
        .video-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 3rem;
        }
        .video-overlay button {
            pointer-events: auto;
            transform: translateZ(1px);
        }
        
        #judge-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 150;
        }
        .judge-main-text {
            font-size: 5.5rem;
            font-weight: 950;
            font-style: italic;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .tap-prompt {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            opacity: 0.6;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body class="h-screen w-screen flex items-center justify-center">

    <div id="start-screen" class="text-center z-[200] transition-opacity duration-500">
        <h1 class="text-4xl md:text-6xl font-bold mb-8 tracking-wider">REACTION TRAINER</h1>
        <button id="start-button" class="bg-blue-600 hover:bg-blue-500 active:scale-95 transition-all text-white font-bold py-4 px-10 rounded-full text-xl shadow-lg shadow-blue-500/50">
            TOUCH TO START
        </button>
    </div>

    <div id="confirm-screen" class="hidden absolute inset-0 flex items-center justify-center z-[150] bg-black/40 transition-opacity duration-500 cursor-pointer">
        <div class="tap-prompt text-2xl tracking-widest text-cyan-400">TAP TO START TRAINING</div>
    </div>

    <div id="video-container" class="hidden fixed inset-0 bg-black flex items-center justify-center fade-in z-10">
        <div id="flash-effect" class="flash-overlay"></div>
        <div id="judge-container"></div>
        
        <video id="video-fail" class="video-layer opacity-100" playsinline webkit-playsinline muted preload="auto">
            <source src="" type="video/mp4">
        </video>

        <video id="video-success" class="video-layer opacity-0" playsinline webkit-playsinline muted preload="auto">
            <source src="" type="video/mp4">
        </video>

        <div id="action-overlay" class="hidden video-overlay">
            <div id="debug-info" class="mb-4 text-xs text-gray-400/50 font-mono bg-black/40 px-3 py-1 rounded-full"></div>
            <div id="button-group" class="flex space-x-6">
                <button id="attack-button" class="bg-red-600 hover:bg-red-500 active:scale-90 transition-all text-white font-black py-4 px-10 rounded-2xl text-2xl shadow-xl border-b-8 border-red-800 active:border-b-0">
                    攻撃
                </button>
                <button id="throw-button" class="bg-orange-500 hover:bg-orange-400 active:scale-90 transition-all text-white font-black py-4 px-10 rounded-2xl text-2xl shadow-xl border-b-8 border-orange-700 active:border-b-0">
                    投げ
                </button>
                <button id="guard-button" class="bg-blue-600 hover:bg-blue-500 active:scale-90 transition-all text-white font-black py-4 px-10 rounded-2xl text-2xl shadow-xl border-b-8 border-blue-800 active:border-b-0">
                    ガード
                </button>
            </div>
        </div>
        
        <div id="error-message" class="hidden absolute z-[300] bg-red-900/90 p-8 rounded-2xl text-white text-center max-w-sm backdrop-blur-md">
            <p class="font-bold text-xl mb-2">LOADING ERROR</p>
            <button onclick="location.reload()" class="mt-6 bg-white text-red-900 px-6 py-2 rounded-full font-bold">再試行</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startButton = document.getElementById('start-button');
            const confirmScreen = document.getElementById('confirm-screen');
            const throwButton = document.getElementById('throw-button');
            const attackButton = document.getElementById('attack-button');
            const guardButton = document.getElementById('guard-button');
            const actionOverlay = document.getElementById('action-overlay');
            const startScreen = document.getElementById('start-screen');
            const videoContainer = document.getElementById('video-container');
            const videoFail = document.getElementById('video-fail');
            const videoSuccess = document.getElementById('video-success');
            const flashEffect = document.getElementById('flash-effect');
            const errorMessage = document.getElementById('error-message');
            const debugInfo = document.getElementById('debug-info');
            const judgeContainer = document.getElementById('judge-container');

            const FPS = 60; 
            
            let startFrame = 90;
            let endFrame = 103;

            // トレーニング動画のペアリスト
            const TRAINING_SESSIONS = [
                {
                    name: "back",
                    fail: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/wakeup-back-fail.mp4",
                    success: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/wakeup-back-success.mp4",
                    start: 90,
                    end: 103,
                    requiredAction: "throw",
                    activeButtons: ["attack", "throw"] // 攻撃と投げを表示
                },
                {
                    name: "forward",
                    fail: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/wakeup-forward-fail.mp4",
                    success: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/wakeup-forward-success.mp4",
                    start: 90,
                    end: 103,
                    requiredAction: "throw",
                    activeButtons: ["attack", "throw"]
                },
                {
                    name: "neutral",
                    fail: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/wakeup-neutral-fail.mp4",
                    success: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/wakeup-neutral-success.mp4",
                    start: 104,
                    end: 110,
                    requiredAction: "attack",
                    activeButtons: ["attack", "throw"]
                },
                {
                    name: "guard_warwick",
                    fail: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/guard-warwick-5b5c5l.mp4",
                    success: "https://github.com/asigaoka/FG/raw/refs/heads/main/assets/guard-warwick-5b5c5l.mp4",
                    start: 45, 
                    end: 55,   
                    requiredAction: "guard",
                    activeButtons: ["guard"] // ガードのみ表示
                }
            ];

            let currentActiveVideo = null;
            let rafId = null;
            let currentSession = null;
            let isJudged = false; 

            function createGaugeGrid(container, gaugeRange, relativeStart) {
                const grid = document.createElement('div');
                grid.className = 'gauge-grid';
                for (let i = 0; i <= gaugeRange; i += 10) {
                    const line = document.createElement('div');
                    line.className = 'grid-line' + (i % 10 === 0 ? ' major' : '');
                    const leftPos = (i / gaugeRange) * 100;
                    line.style.left = `${leftPos}%`;
                    const label = document.createElement('div');
                    label.className = 'grid-label';
                    label.innerText = `${relativeStart + i}f`;
                    label.style.left = `${leftPos}%`;
                    grid.appendChild(line);
                    grid.appendChild(label);
                }
                container.appendChild(grid);
            }

            function showJudgement(isSuccess, currentFrame, wasCorrectAction) {
                isJudged = true; 
                judgeContainer.innerHTML = '';
                flashEffect.classList.remove('do-flash');
                void flashEffect.offsetWidth; 

                let judgeLabel = isSuccess ? "SUCCESS" : "MISS";
                let judgeClass = isSuccess ? "color-success" : "color-miss";
                let flashColor = isSuccess ? "rgba(34, 211, 238, 0.4)" : "rgba(248, 113, 113, 0.4)";

                flashEffect.style.setProperty('--flash-color', flashColor);
                flashEffect.classList.add('do-flash');

                const wrapper = document.createElement('div');
                wrapper.className = 'judge-animation flex flex-col items-center';

                const mainText = document.createElement('div');
                mainText.className = `judge-main-text ${judgeClass}`;
                mainText.innerText = judgeLabel;
                wrapper.appendChild(mainText);

                const diffDetail = document.createElement('div');
                diffDetail.className = 'diff-text';
                
                if (!wasCorrectAction) {
                    const labelMap = { "attack": "攻撃", "throw": "投げ", "guard": "ガード" };
                    const correctLabel = labelMap[currentSession.requiredAction] || "不明";
                    diffDetail.innerHTML = `<span class="late-text">WRONG BUTTON</span> <span class="text-sm opacity-70">(正解: ${correctLabel})</span>`;
                }
                else if (currentFrame < startFrame) {
                    diffDetail.innerHTML = `<span class="early-text">TOO EARLY</span> <span class="text-sm opacity-70">(-${(startFrame - currentFrame).toFixed(1)}F 早すぎ)</span>`;
                } 
                else if (currentFrame > endFrame) {
                    diffDetail.innerHTML = `<span class="late-text">TOO LATE</span> <span class="text-sm opacity-70">(+${(currentFrame - endFrame).toFixed(1)}F 遅すぎ)</span>`;
                } 
                else {
                    const reactionTime = currentFrame - startFrame;
                    diffDetail.innerHTML = `<span class="success-text">REACTION: ${reactionTime.toFixed(1)}F</span> <span class="text-sm opacity-50">IN RANGE</span>`;
                }
                wrapper.appendChild(diffDetail);

                const gaugeRange = 60; 
                const GAUGE_RELATIVE_START = startFrame - 20; 
                const gaugeContainer = document.createElement('div');
                gaugeContainer.className = 'timing-gauge-container';
                createGaugeGrid(gaugeContainer, gaugeRange, GAUGE_RELATIVE_START);

                const successZone = document.createElement('div');
                successZone.className = 'success-zone';
                const zoneWidthPercent = ((endFrame - startFrame) / gaugeRange) * 100;
                const zoneLeftPercent = ((startFrame - GAUGE_RELATIVE_START) / gaugeRange) * 100;
                successZone.style.width = `${zoneWidthPercent}%`;
                successZone.style.left = `${zoneLeftPercent}%`;
                gaugeContainer.appendChild(successZone);

                const marker = document.createElement('div');
                marker.className = 'timing-marker';
                const markerPos = ((currentFrame - GAUGE_RELATIVE_START) / gaugeRange) * 100;
                marker.style.left = `${Math.max(0, Math.min(100, markerPos))}%`;
                gaugeContainer.appendChild(marker);

                wrapper.appendChild(gaugeContainer);
                judgeContainer.appendChild(wrapper);
            }

            function updateDebug() {
                if (currentActiveVideo === videoFail && !videoFail.paused) {
                    const currentFrame = Math.floor(videoFail.currentTime * FPS);
                    debugInfo.innerText = `${currentFrame}F`;
                }
                rafId = requestAnimationFrame(updateDebug);
            }

            function handleInput(actionType) {
                if (isJudged) return;

                const currentFrame = videoFail.currentTime * FPS;
                const wasCorrectAction = (actionType === currentSession.requiredAction);
                
                if (wasCorrectAction && 
                    currentFrame >= startFrame && 
                    currentFrame <= endFrame) {
                    
                    showJudgement(true, currentFrame, true);
                    actionOverlay.classList.add('hidden');
                    
                    if (videoSuccess.src === videoFail.src) {
                        videoFail.pause();
                        cancelAnimationFrame(rafId);
                    } else {
                        videoSuccess.currentTime = 0;
                        videoSuccess.play().then(() => {
                            videoSuccess.style.opacity = "1";
                            videoFail.style.opacity = "0";
                            videoFail.pause();
                            currentActiveVideo = videoSuccess;
                            cancelAnimationFrame(rafId);
                        });
                    }
                } else {
                    showJudgement(false, currentFrame, wasCorrectAction);
                    actionOverlay.classList.add('hidden');
                }
            }

            function backToConfirmScreen() {
                actionOverlay.classList.add('hidden');
                videoFail.pause();
                videoSuccess.pause();
                videoFail.currentTime = 0;
                videoSuccess.currentTime = 0;
                videoFail.style.opacity = "1";
                videoSuccess.style.opacity = "0";
                confirmScreen.classList.remove('hidden');
                confirmScreen.classList.remove('opacity-0');
                cancelAnimationFrame(rafId);
            }

            function updateButtonVisibility() {
                const buttons = {
                    "attack": attackButton,
                    "throw": throwButton,
                    "guard": guardButton
                };
                
                Object.keys(buttons).forEach(key => {
                    if (currentSession.activeButtons.includes(key)) {
                        buttons[key].classList.remove('hidden');
                    } else {
                        buttons[key].classList.add('hidden');
                    }
                });
            }

            function startTraining() {
                confirmScreen.classList.add('opacity-0');
                judgeContainer.innerHTML = '';
                isJudged = false; 
                
                currentSession = TRAINING_SESSIONS[Math.floor(Math.random() * TRAINING_SESSIONS.length)];
                
                startFrame = currentSession.start;
                endFrame = currentSession.end;

                updateButtonVisibility();

                videoFail.src = currentSession.fail;
                videoSuccess.src = currentSession.success;
                
                videoFail.load();
                videoSuccess.load();

                setTimeout(() => {
                    confirmScreen.classList.add('hidden');
                    actionOverlay.classList.remove('hidden');
                    videoFail.currentTime = 0;
                    videoSuccess.currentTime = 0;
                    videoFail.style.opacity = "1";
                    videoSuccess.style.opacity = "0";
                    currentActiveVideo = videoFail;
                    
                    videoFail.play().catch(() => errorMessage.classList.remove('hidden'));
                    updateDebug();
                }, 500);
            }

            startButton.addEventListener('click', () => {
                startScreen.classList.add('opacity-0');
                setTimeout(() => {
                    startScreen.classList.add('hidden');
                    videoContainer.classList.remove('hidden');
                    confirmScreen.classList.remove('hidden');
                    confirmScreen.classList.remove('opacity-0');
                }, 500);
            });

            confirmScreen.addEventListener('click', () => {
                startTraining();
            });

            throwButton.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                handleInput("throw");
            });

            attackButton.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                handleInput("attack");
            });

            guardButton.addEventListener('click', (e) => {
                e.preventDefault(); e.stopPropagation();
                handleInput("guard");
            });

            [videoFail, videoSuccess].forEach(v => {
                v.onended = () => { 
                    if (v === currentActiveVideo) {
                        if (v === videoFail && !isJudged) {
                            showJudgement(false, videoFail.duration * FPS, true);
                            actionOverlay.classList.add('hidden');
                        }
                        backToConfirmScreen(); 
                    }
                };
                v.onerror = () => { if (v === currentActiveVideo) errorMessage.classList.remove('hidden'); };
            });
        });
    </script>
</body>
</html>
